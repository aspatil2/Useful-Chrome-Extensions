<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Score Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ATS Analyzer</h1>
      <p class="subtitle">Optimize your resume against the current job posting</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="analysis">Analysis</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <!-- Settings Tab -->
    <main id="settings" class="tab-content" style="display: none;">
      <div class="card">
        <h3>Resume Configuration</h3>
        <label class="file-upload-label">
          <input type="file" id="resumeUpload" accept="application/pdf" />
          <span id="uploadText">📄 Upload Default Resume (PDF)</span>
        </label>
        <div id="resumeStatus" class="status-msg"></div>
      </div>

      <div class="card">
        <h3>LLM Configuration</h3>
        <div class="form-group">
          <label for="apiUrl">API URL</label>
          <input type="text" id="apiUrl" placeholder="e.g., https://openrouter.ai/api/v1/chat/completions">
        </div>
        <div class="form-group">
          <label for="apiKey">API Key (Optional for some local LLMs)</label>
          <input type="password" id="apiKey" placeholder="Your API Key">
        </div>
        <div class="form-group">
          <label for="apiModel">Model Name</label>
          <input type="text" id="apiModel" placeholder="e.g., openai/gpt-3.5-turbo">
        </div>
        <button id="saveSettingsBtn" class="primary-btn">Save Settings</button>
        <div id="settingsStatus" class="status-msg"></div>
      </div>
    </main>

    <!-- Analysis Tab -->
    <main id="analysis" class="tab-content active">
      <div class="action-area">
        <button id="analyzeBtn" class="primary-btn pulse">Generate ATS Score</button>
      </div>

      <div id="loadingIndicator" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p id="loadingStatus">Extracting text...</p>
      </div>

      <div id="resultsArea" class="results" style="display: none;">
        <div class="score-card">
          <div class="score-circle">
            <span id="atsScoreValue">0</span><span class="percent">%</span>
          </div>
          <div class="score-label">Match Score</div>
        </div>
        
        <div class="keywords-card">
          <h3>Missing Keywords / Skills</h3>
          <ul id="missingKeywordsList"></ul>
        </div>
        
        <div class="recommendation-card">
          <h3>Recommendation</h3>
          <p id="recommendationText"></p>
        </div>
      </div>
    </main>
  </div>
  
  <script src="lib/pdf.min.js"></script>
  <script src="lib/pdf.worker.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
